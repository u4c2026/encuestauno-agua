// ── PROGRESS ─────────────────────────────────────────
function updateProgress(){
  var countable=Q.filter(function(q){return q.id.charAt(0)!=='_';});
  var done=Object.keys(answers).length;
  var pct=Math.min(Math.round(done/countable.length*100),100);
  $('progFill').style.width=pct+'%';
  $('pctLabel').textContent=pct+'%';
  var cur=Q[qIdx];
  $('stepLabel').textContent=cur&&cur.label?cur.label:'';
  $('sectionTag').textContent=cur&&cur.section?cur.section:'';
}

function addBot(html){
  var msgs=$('msgs'), row=mk('div','row');
  row.innerHTML='<div class="av av-bot">💧</div><div class="bbl bbl-bot">'+html+'</div>';
  msgs.appendChild(row); scrollDown();
}
function addUser(txt){
  var msgs=$('msgs'), row=mk('div','row me');
  row.innerHTML='<div class="av av-me">Yo</div><div class="bbl bbl-me">'+txt+'</div>';
  msgs.appendChild(row); scrollDown();
}
function showTyping(cb){
  var msgs=$('msgs'), row=mk('div','typing-row'); row.id='typr';
  row.innerHTML='<div class="av av-bot">💧</div><div class="typing-bbl"><span></span><span></span><span></span></div>';

}
function clearIA(){$('ia').innerHTML='';}

// ── NAVIGATION ───────────────────────────────────────
function next(value,display){
  var cur=Q[qIdx];
  if(cur.id.charAt(0)!=='_'){answers[cur.id]=value;}
  if(display){addUser(display);}
  clearIA(); updateProgress(); qIdx++;
  while(qIdx<Q.length&&Q[qIdx].showIf&&!Q[qIdx].showIf()){qIdx++;}
  if(qIdx<Q.length){showTyping(function(){renderQ(Q[qIdx]);});}
}

// ── RENDER ───────────────────────────────────────────
function renderQ(q){
  addBot(q.msg);
  var ia=$('ia');

  if(q.type==='welcome'||q.type==='choices'){
    var wrap=mk('div','choices');
    q.opts.forEach(function(o){
      var btn=mk('button','ch-btn');
      btn.innerHTML='<span class="ch-emoji">'+o.e+'</span>'+o.t;
      btn.onclick=function(){next(o.t,o.e+' '+o.t);};
      wrap.appendChild(btn);
    });
    ia.appendChild(wrap);

  }else if(q.type==='pills'){
    var wrap=mk('div','pills');
    q.opts.forEach(function(o){
      var btn=mk('button','pill-btn');
      btn.textContent=o.e+' '+o.t;
      btn.onclick=function(){next(o.t,o.e+' '+o.t);};
      wrap.appendChild(btn);
    });
    ia.appendChild(wrap);

  }else if(q.type==='multi'){
    var wrap=mk('div','multi-wrap');
    var optDiv=mk('div','multi-opts');
    var selected=[];
    q.opts.forEach(function(o,i){
      var item=mk('div','multi-item');
      var cb=document.createElement('input');cb.type='checkbox';cb.id='mc'+i;
      var lbl=mk('span','multi-label');lbl.textContent=o.t;
      var emo=mk('span','multi-emoji');emo.textContent=o.e;
      item.appendChild(cb);item.appendChild(emo);item.appendChild(lbl);
      item.onclick=function(){
        cb.checked=!cb.checked;
        item.classList.toggle('selected',cb.checked);
        if(cb.checked){selected.push(o.t);}
        else{selected=selected.filter(function(s){return s!==o.t;});}
      };
      optDiv.appendChild(item);
    });
    var done=mk('button','multi-done');done.textContent='Confirmar selección →';
    done.onclick=function(){
      if(!selected.length){alert('Por favor seleccione al menos una opción');return;}
      next(selected.join(', '),'✓ '+selected.join(', '));
    };
    wrap.appendChild(optDiv);wrap.appendChild(done);
    ia.appendChild(wrap);

  }else if(q.type==='text'){
    var wrap=mk('div','txt-wrap');
    var inp=document.createElement('input');
    inp.type='text';inp.className='txt-single';inp.id='txt-inp';inp.placeholder=q.ph||'';
    wrap.appendChild(inp);
    var btns=mk('div','txt-btns');
    if(q.skip){
      var s=mk('button','skip-btn');s.textContent='Omitir';
      s.onclick=function(){next('','(omitido)');};
      btns.appendChild(s);
    }
    var send=mk('button','send-btn');send.textContent='Enviar →';
    send.onclick=function(){
      var v=inp.value.trim();
      if(q.req&&!v){inp.style.borderColor='#C0392B';inp.focus();return;}
      next(v||'',v||'(sin respuesta)');
    };
    inp.onkeydown=function(e){if(e.key==='Enter')send.click();};
    btns.appendChild(send);wrap.appendChild(btns);
    ia.appendChild(wrap);
    setTimeout(function(){inp.focus();},300);

  }else if(q.type==='textarea'){
    var wrap=mk('div','txt-wrap');
    var ta=document.createElement('textarea');
    ta.className='txt-area';ta.id='txt-inp';ta.placeholder=q.ph||'';
    wrap.appendChild(ta);
    var btns=mk('div','txt-btns');
    if(q.skip){
      var s=mk('button','skip-btn');s.textContent='Omitir';
      s.onclick=function(){next('','(omitido)');};
      btns.appendChild(s);
    }
    var send=mk('button','send-btn');send.textContent='Enviar →';
    send.onclick=function(){
      var v=ta.value.trim();
      if(q.req&&!v){ta.style.borderColor='#C0392B';ta.focus();return;}
      next(v||'',v.length>60?v.slice(0,60)+'...':v||'(omitido)');
    };
    btns.appendChild(send);wrap.appendChild(btns);
    ia.appendChild(wrap);

  }else if(q.type==='number'){
    var wrap=mk('div','num-wrap');
    var curVal=q.def||0;
    var minus=mk('button','num-ctrl');minus.textContent='−';
    var disp=document.createElement('input');
    disp.type='number';disp.className='num-val';disp.id='num-val';
    disp.value=curVal;disp.min=q.min||0;disp.max=q.max||999;
    var plus=mk('button','num-ctrl');plus.textContent='+';
    var ok=mk('button','num-ok');ok.textContent='OK →';
    minus.onclick=function(){disp.value=Math.max(q.min||0,parseInt(disp.value)-1);};
    plus.onclick=function(){disp.value=Math.min(q.max||999,parseInt(disp.value)+1);};
    ok.onclick=function(){var v=String(parseInt(disp.value)||0);next(v,v);};
    wrap.appendChild(minus);wrap.appendChild(disp);wrap.appendChild(plus);wrap.appendChild(ok);
    ia.appendChild(wrap);

  }else if(q.type==='date'){
    var today=new Date();
    var yy=today.getFullYear(),mm=String(today.getMonth()+1).padStart(2,'0'),dd=String(today.getDate()).padStart(2,'0');
    var todayISO=yy+'-'+mm+'-'+dd, todayFmt=mm+'/'+dd+'/'+yy;
    var wrap=mk('div','date-wrap');
    var inp=document.createElement('input');
    inp.type='date';inp.className='date-inp';inp.id='date-inp';inp.value=todayISO;
    wrap.appendChild(inp);
    var btns=mk('div','date-btns');
    var todayBtn=mk('button','date-today');todayBtn.textContent='📅 Usar hoy';
    todayBtn.onclick=function(){next(todayFmt,'📅 '+todayFmt);};
    var okBtn=mk('button','date-ok');okBtn.textContent='Confirmar →';
    okBtn.onclick=function(){
      var v=inp.value;
      var fmt=v?inputToDate(v):todayFmt;
      next(fmt,'📅 '+fmt);
    };
    btns.appendChild(todayBtn);btns.appendChild(okBtn);wrap.appendChild(btns);
    ia.appendChild(wrap);

  }else if(q.type==='submit'){
    var wrap=mk('div','choices');
    var yes=mk('button','ch-btn');
    yes.innerHTML='<span class="ch-emoji">✅</span>Sí, enviar mis respuestas';
    yes.onclick=submitSurvey;
    var no=mk('button','ch-btn');
    no.innerHTML='<span class="ch-emoji">🔄</span>Empezar de nuevo';
    no.onclick=doRestart;
    wrap.appendChild(yes);wrap.appendChild(no);
    ia.appendChild(wrap);
  }
  scrollDown();
}

    '👧 Niños/escuela: '+(f['Children miss school for water']||'—'),
    '💰 Gasto/semana: Bs.'+(f['Weekly water expense']||'0'),
    '',
    '🚰 Conoce proyecto: '+(f['Knows about water project']||'—'),
    '✅ Participaría: '+(f['Willing to participate in water system care']||'—'),
    '',
    '📝 '+(f['Concerns or requests for project']||'Sin comentarios adicionales'),
    '━━━━━━━━━━━━━━━━━━━━━━━━'
  ];
  return lines.join('\n');
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){alert('✓ Respuestas copiadas');});
  }else{
    var ta=document.createElement('textarea');ta.value=text;
    ta.style.cssText='position:fixed;top:10px;left:10px;right:10px;bottom:10px;z-index:9999;font-size:12px;padding:12px;border-radius:12px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);alert('✓ Copiado');
  }
}

// ── RESTART ──────────────────────────────────────────
function doRestart(){
  answers={};qIdx=0;audioB64=null;audios={};currentAudioField=null;
  if(mediaRec&&mediaRec.state!=='inactive'){
    try{mediaRec.stop();mediaRec.stream.getTracks().forEach(function(t){t.stop();});}catch(e){}
  }
  clearInterval(recTmr);mediaRec=null;recChunks=[];recSecs=0;
  $('msgs').innerHTML='';$('ia').innerHTML='';
  $('successScreen').classList.remove('on');
  updateProgress();renderQ(Q[0]);
}

// ── START ────────────────────────────────────────────
window.addEventListener('load',function(){renderQ(Q[0]);updateProgress();});
</script>
